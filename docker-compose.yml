version: '3.8'

services:
  backend:
    build: ./backend
    container_name: studo-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: studo-frontend
    ports:
      - "80:80"
    environment:
      - VITE_WS_URL=http://localhost:8000
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
